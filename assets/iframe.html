<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Polotno App</title>

  <!-- ✅ Full styling from Blueprint and Polotno -->
  <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/core@5/lib/css/blueprint.css" />
  <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/icons@5/lib/css/blueprint-icons.css" />
  <link rel="stylesheet" href="https://unpkg.com/polotno@2.23.2/polotno.css" />

  <!-- ✅ Optional: reset body margin -->
  <style>
    /*original styling don't mess*/
    body {
      margin: 0;
      padding: 0;
    }
    #polotno-app-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

/*style for top bar*/
    
/* Top toolbar container */
.polotno-toolbar.bp5-navbar {
  background-color: #ffffff !important;
  padding: 10px 16px !important;
  gap: 10px;
  font-size: 15px !important;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
}

/* Buttons in the toolbar */
.polotno-toolbar.bp5-navbar .bp5-button {
  font-size: 15px !important;
  padding: 6px 12px !important;
  height: auto !important;
}

/* Icons inside buttons */
.polotno-toolbar.bp5-navbar .bp5-button svg {
  width: 18px !important;
  height: 18px !important;
}

/* Select dropdowns */
.polotno-toolbar.bp5-navbar .bp5-html-select select {
  font-size: 15px !important;
  padding: 6px 10px !important;
  height: auto !important;
}

/* Popover targets (color pickers, etc.) */
.polotno-toolbar.bp5-navbar .bp5-popover-target {
  font-size: 15px !important;
  padding: 6px 10px !important;
}

    
    /*side panel styling*/
  .polotno-side-panel-tab {
    color: #444;
    padding: 10px;
    transition: all 0.3s ease;
  }

  .polotno-side-panel-tab.active {
    background-color: #ffffff !important;
    color: #205380;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  .polotno-side-panel-tab.active svg {
    fill: #205380 !important;
  }

  .polotno-side-panel-tab svg {
    fill: #666 !important;
    transition: fill 0.3s ease;
      width: 24px;
  height: 24px;
  }

  .polotno-side-panel-tab:hover {
    background-color: #eaeaea;
    cursor: pointer;
  }

  .polotno-side-panel-tab.active div {
    color: #205380;
  }

    .polotno-side-panel-tab {
  font-size: 15px; /* increase from default */
}
    
.go806284747 {
  background-color: #f2f7f9 !important;
}
    
  </style>
</head>
<body>
  <div id="polotno-app-container"></div>

  <!-- ✅ Your latest bundle.js from GitHub -->
  <script src="bundle.js"></script>
</body>
</html>
