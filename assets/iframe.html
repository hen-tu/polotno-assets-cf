<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Polotno App</title>

  <!-- ✅ Full styling from Blueprint and Polotno -->
  <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/core@5/lib/css/blueprint.css" />
  <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/icons@5/lib/css/blueprint-icons.css" />
  <link rel="stylesheet" href="https://unpkg.com/polotno@2.23.2/polotno.css" />

  <!-- ✅ Optional: reset body margin -->
  <style>
    /*original styling don't mess*/
    body {
      margin: 0;
      padding: 0;
    }
    #polotno-app-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }


    /*styling for photo grid*/
.polotno-panel-container {
  max-height: 100%;
  overflow-y: auto;
  scroll-behavior: smooth;
}

  /* Make the thumbnail container square and remove border */
  .polotno-panel-container > div > div {
    border: none !important;
    border-radius: 0 !important;
    background: none !important;
    aspect-ratio: 1 / 1;
    padding: 0 !important;
    overflow: hidden;
  }

  /* Style the image to fit inside the square */
  .polotno-panel-container img {
    width: 100%;
    height: 100%;
    object-fit: contain !important;
    background-color: #fff; /* Optional: set to match your app background */
    display: block;
  }

  /* Hide the image name (the label below each image) */
  .polotno-panel-container div div div:last-child {
    display: none !important;
  }
    
    
    /*style for top bar*/
    
/* Force override of the inline styles on the top toolbar */
.polotno-toolbar.bp5-navbar {
  background-color: #ffffff !important;
  padding: 10px 16px !important;
  gap: 12px !important;
  overflow-x: auto !important;
  border-bottom: 1px solid #e0e0e0 !important;
}

/* Slightly increase font size in entire toolbar */
.polotno-toolbar.bp5-navbar,
.polotno-toolbar.bp5-navbar * {
  font-size: 15px !important;
}

/* Enlarge buttons */
.polotno-toolbar.bp5-navbar .bp5-button {
  padding: 6px 12px !important;
  min-height: 34px !important;
}

/* Enlarge icons */
.polotno-toolbar.bp5-navbar .bp5-icon svg,
.polotno-toolbar.bp5-navbar svg {
  width: 18px !important;
  height: 18px !important;
}
    
    /*side panel styling*/
  .polotno-side-panel-tab {
    color: #444;
    padding: 10px;
    transition: all 0.3s ease;
  }

  .polotno-side-panel-tab.active {
    background-color: #ffffff !important;
    color: #205380;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
  }

  .polotno-side-panel-tab.active svg {
    fill: #205380 !important;
  }

  .polotno-side-panel-tab svg {
    fill: #666 !important;
    transition: fill 0.3s ease;
      width: 24px;
  height: 24px;
  }

  .polotno-side-panel-tab:hover {
    background-color: #eaeaea;
    cursor: pointer;
  }

  .polotno-side-panel-tab.active div {
    color: #205380;
  }

    .polotno-side-panel-tab {
  font-size: 15px; /* increase from default */
}
    
.go806284747 {
  background-color: #f2f7f9 !important;
}
    
  </style>
</head>
<body>
  <div id="polotno-app-container"></div>

  <!-- ✅ Your latest bundle.js from GitHub -->
  <script src="bundle.js"></script>
</body>
</html>
