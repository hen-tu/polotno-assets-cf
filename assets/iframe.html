<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Polotno App</title>

  <!-- ✅ Full styling from Blueprint and Polotno -->
  <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/core@5/lib/css/blueprint.css" />
  <link rel="stylesheet" href="https://unpkg.com/@blueprintjs/icons@5/lib/css/blueprint-icons.css" />
  <link rel="stylesheet" href="https://unpkg.com/polotno@2.23.2/polotno.css" />

  <!-- ✅ Optional: reset body margin -->
  <style>
    /*original styling don't mess*/
    body {
      margin: 0;
      padding: 0;
    }
    #polotno-app-container {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

/* Make the thumbnail container square and remove border*/
  .polotno-panel-container > div > div {
    border: none !important;
    border-radius: 0 !important;
    background: none !important;
    aspect-ratio: 1 / 1;
    padding: 0 !important;
    overflow: hidden;
  }

   Style the image to fit inside the square
  .polotno-panel-container img {
    width: 100%;
    height: 100%;
    object-fit: contain !important;
    background-color: #fff; /* Optional: set to match your app background 
    display: block;
  }

  Hide the image name (the label below each image) 
  .polotno-panel-container div div div:last-child {
    display: none !important;
  }
    
  </style>
</head>
<body>
  <div id="polotno-app-container"></div>

  <!-- ✅ Your latest bundle.js from GitHub -->
  <script src="bundle.js"></script>
</body>
</html>
